name: Deploy Calculator App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to ECR
      run: |
        aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
        | docker login --username AWS --password-stdin ${{ secrets.ECR_REPOSITORY }}

    - name: Build Docker Image
      run: docker build -t myapp .

    - name: Tag Docker Image
      run: docker tag myapp:latest ${{ secrets.ECR_REPOSITORY }}:latest

    - name: Push Image to ECR
      run: docker push ${{ secrets.ECR_REPOSITORY }}:latest

    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |

          # Login to ECR from EC2
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
          | sudo docker login --username AWS --password-stdin ${{ secrets.ECR_REPOSITORY }}

          # Stop old container
          sudo docker stop myapp || true

          # Remove old container
          sudo docker rm myapp || true

          # Pull latest image
          sudo docker pull ${{ secrets.ECR_REPOSITORY }}:latest

          # Run new container
          sudo docker run -d -p 5000:5000 --name myapp ${{ secrets.ECR_REPOSITORY }}:latest
