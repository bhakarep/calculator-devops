name: Deploy Calculator App

on:
 push:
   branches:
     - main

jobs:
 deploy:
   runs-on: ubuntu-latest

   steps:

   - name: Checkout Code
     uses: actions/checkout@v3

   - name: Configure AWS Credentials
     uses: aws-actions/configure-aws-credentials@v2
     with:
       aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
       aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
       aws-region: ${{ secrets.AWS_REGION }}

   - name: Login to ECR
     run: |
       aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin ${{ secrets.ECR_REPOSITORY }}

   - name: Build Docker Image
     run: docker build -t myapp .

   - name: Tag Image
     run: docker tag myapp:latest ${{ secrets.ECR_REPOSITORY }}:latest

   - name: Push Image to ECR
     run: docker push ${{ secrets.ECR_REPOSITORY }}:latest

   - name: Deploy to EC2
     uses: appleboy/ssh-action@master
     with:
       host: ${{ secrets.EC2_HOST }}
       username: ${{ secrets.EC2_USER }}
       key: ${{ secrets.EC2_SSH_KEY }}
       script: |
         sudo docker stop myapp || true
         sudo docker rm myapp || true
         sudo docker pull ${{ secrets.ECR_REPOSITORY }}:latest
         sudo docker run -d -p 5000:5000 --name myapp ${{ secrets.ECR_REPOSITORY }}:latest
